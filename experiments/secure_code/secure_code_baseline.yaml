# Secure code baseline — sampling verifier for comparison
# experiment_file is relative to this YAML file

experiment_file: secure_code.py
load_prompts_fn: load_prompts
constraint_fn: constraint_fn
check_call_fn: check_call_fn
instance_context_fn: instance_context_fn
cache: true
cache_dataset_name: secure_code

# ── load_prompts() extra kwargs (forwarded by CLI/batch runner) ───────────────
language: rust
dataset_path: "autocomplete.json" # null = use default (data/instruct-v2.json)
question_prefix: ""
question_prefix_file: "prompt_prefix_autocomplete.txt"

# ── Grammar ───────────────────────────────────────────────────────────────────
grammar: rust

# ── beaver.run() algorithm params ────────────────────────────────────────────
verifier: sampling
max_iterations: 1000
gen_length: 32
use_chat_template: false
